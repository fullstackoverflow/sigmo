[app]
  environment = "development"
  listen_address = "0.0.0.0:9527"
  otp_required = true
  auth_providers = ["telegram"]

[channels]
  [channels.telegram]
    bot_token = "Your Telegram Bot Token"
    recipients = ["1231321"]

  [channels.bark]
    endpoint = "https://api.day.app"
    recipients = ["your_device_key"]

  [channels.gotify]
    endpoint = "https://push.example.de"
    recipients = ["your_app_token"]
    priority = 5

  [channels.sc3]
    endpoint = "https://123.push.ft07.com/send/your_sendkey.send"

  [channels.http]
    endpoint = "https://httpbin.org/post"

    [channels.http.headers]
      Authorization = "Bearer 1234567890"
      Content-Type = "application/json"

  [channels.email]
    smtp_host = "smtp.example.com"
    smtp_port = 587
    smtp_username = "user@example.com"
    smtp_password = "app_password"
    from = "sigmo@example.com"
    recipients = ["ops@example.com"]
    tls_policy = "mandatory"
    ssl = false

[[scheduled_sms]]
  name = "quarterly-balance-check"
  enabled = false
  modem_id = "860710083679723"
  to = "+447973000186"
  text = "A"
  interval_months = 5
  next_send_at = 2026-06-01T00:00:00Z
