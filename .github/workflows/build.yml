name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: [v*]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    name: Build for ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: 386, name: linux-i386 }
          - { arch: amd64, name: linux-amd64 }
          - { arch: arm, name: linux-armhf }
          - { arch: arm64, name: linux-arm64 }
          - { arch: ppc64le, name: linux-ppc64le }
          - { arch: s390x, name: linux-s390x }
          - { arch: riscv64, name: linux-riscv64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Build frontend
        run: |
          cd web
          bun install
          bun run build --mode prod

      - name: Build for ${{ matrix.target.name }}
        run: |
          go generate ./...
          BUILD_VERSION=$(git describe --always --tags --match "v*" --dirty="-dev")
          CGO_ENABLED=0 GOARCH=${{ matrix.target.arch }} go build -trimpath -ldflags="-w -s -X main.BuildVersion=$BUILD_VERSION" -o sigmo-${{ matrix.target.name }}

      - name: Upload ${{ matrix.target.name }} to Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sigmo-${{ matrix.target.name }}
          path: sigmo-${{ matrix.target.name }}

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: "*"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*"

  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: sigmo-linux-amd64
          path: artifacts/amd64

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: sigmo-linux-arm64
          path: artifacts/arm64

      - name: Download linux-armhf binary
        uses: actions/download-artifact@v8
        with:
          name: sigmo-linux-armhf
          path: artifacts/armv7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push per-arch images from release binaries
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          SHA_TAG="sha-${SHORT_SHA}"

          mkdir -p dockerctx/amd64 dockerctx/arm64 dockerctx/armv7
          cp artifacts/amd64/sigmo-linux-amd64 dockerctx/amd64/sigmo
          cp artifacts/arm64/sigmo-linux-arm64 dockerctx/arm64/sigmo
          cp artifacts/armv7/sigmo-linux-armhf dockerctx/armv7/sigmo
          chmod +x dockerctx/amd64/sigmo dockerctx/arm64/sigmo dockerctx/armv7/sigmo

          docker buildx build --platform linux/amd64 -f Dockerfile -t "${IMAGE}:${SHA_TAG}-amd64" --push dockerctx/amd64
          docker buildx build --platform linux/arm64 -f Dockerfile -t "${IMAGE}:${SHA_TAG}-arm64" --push dockerctx/arm64
          docker buildx build --platform linux/arm/v7 -f Dockerfile -t "${IMAGE}:${SHA_TAG}-armv7" --push dockerctx/armv7

      - name: Create and push multi-arch manifests
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          SHA_TAG="sha-${SHORT_SHA}"

          SOURCES=(
            "${IMAGE}:${SHA_TAG}-amd64"
            "${IMAGE}:${SHA_TAG}-arm64"
            "${IMAGE}:${SHA_TAG}-armv7"
          )

          docker buildx imagetools create -t "${IMAGE}:${SHA_TAG}" "${SOURCES[@]}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            docker buildx imagetools create -t "${IMAGE}:latest" "${SOURCES[@]}"
            docker buildx imagetools create -t "${IMAGE}:${GITHUB_REF_NAME}" "${SOURCES[@]}"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            docker buildx imagetools create -t "${IMAGE}:${GITHUB_REF_NAME}" "${SOURCES[@]}"
          fi
